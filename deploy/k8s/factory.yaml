apiVersion: v1
kind: Service
metadata:
  name: factory
  namespace: taintfactory
spec:
  selector:
    app: factory
  ports:
    - port: 80
      targetPort: 17432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: factory
  namespace: taintfactory
spec:
  serviceName: factory
  replicas: 1
  selector:
    matchLabels:
      app: factory
  template:
    metadata:
      labels:
        app: factory
    spec:
      containers:
        - name: factory
          image: registry.digitalocean.com/YOUR_REGISTRY/taintfactory:latest
          ports:
            - containerPort: 17432
          env:
            - name: FACTORY_DATA_DIR
              value: /data
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: DATABASE_URL
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: CLAUDE_CODE_OAUTH_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: GITHUB_TOKEN
            - name: DOCKER_HOST
              value: tcp://localhost:2375
            - name: FACTORY_REPOS
              valueFrom:
                configMapKeyRef:
                  name: factory-config
                  key: FACTORY_REPOS
                  optional: true
          volumeMounts:
            - name: factory-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 17432
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 17432
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
      volumes:
        - name: docker-storage
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: factory-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: do-block-storage
        resources:
          requests:
            storage: 20Gi

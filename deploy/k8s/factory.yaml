apiVersion: v1
kind: Service
metadata:
  name: factory
  namespace: taintfactory
spec:
  selector:
    app: factory
  ports:
    - port: 80
      targetPort: 17432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: factory
  namespace: taintfactory
spec:
  serviceName: factory
  replicas: 1
  selector:
    matchLabels:
      app: factory
  template:
    metadata:
      labels:
        app: factory
    spec:
      nodeSelector:
        doks.digitalocean.com/node-pool: pool-81jjnbrzc
      initContainers:
        - name: fix-perms
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 /data
              cp /config/config.yaml /data/config.yaml
              chown 1000:1000 /data/config.yaml
          volumeMounts:
            - name: factory-data
              mountPath: /data
            - name: pipeline-config
              mountPath: /config
      containers:
        - name: factory
          image: registry.digitalocean.com/personalcluster/taintfactory:latest
          ports:
            - containerPort: 17432
          env:
            - name: FACTORY_DATA_DIR
              value: /data
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: DATABASE_URL
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: CLAUDE_CODE_OAUTH_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: GITHUB_TOKEN
            - name: FACTORY_PRIMARY_REPO
              value: "git@github.com:mbrucker/deathcookies.git"
            - name: FACTORY_WITH_ORCHESTRATOR
              value: "true"
            - name: DOCKER_HOST
              value: tcp://localhost:2375
            - name: FACTORY_REPOS
              valueFrom:
                configMapKeyRef:
                  name: factory-config
                  key: FACTORY_REPOS
                  optional: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 6Gi
          volumeMounts:
            - name: factory-data
              mountPath: /data
            - name: registry-creds
              mountPath: /var/run/secrets/registry
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 17432
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 17432
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
      volumes:
        - name: docker-storage
          emptyDir: {}
        - name: pipeline-config
          configMap:
            name: factory-pipeline-config
        - name: registry-creds
          secret:
            secretName: registry-push-creds
  volumeClaimTemplates:
    - metadata:
        name: factory-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: do-block-storage
        resources:
          requests:
            storage: 20Gi

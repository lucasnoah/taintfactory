# RBAC for factory pod to manage deploys across namespaces.
# The factory default service account gets cluster-wide access to
# resources needed by deploy pipeline stages (helm upgrade, kubectl, migrations).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: factory-deployer
rules:
  # Core + apps + batch + networking resources for Helm releases
  - apiGroups: ["", "apps", "batch", "networking.k8s.io"]
    resources:
      - pods
      - pods/log
      - services
      - deployments
      - statefulsets
      - replicasets
      - jobs
      - cronjobs
      - configmaps
      - secrets
      - ingresses
      - persistentvolumeclaims
      - events
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Autoscaling (HorizontalPodAutoscaler)
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # CloudNativePG (Cluster, ScheduledBackup)
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "scheduledbackups", "backups", "poolers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Sealed Secrets
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespace access
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: factory-deployer
subjects:
  - kind: ServiceAccount
    name: default
    namespace: taintfactory
roleRef:
  kind: ClusterRole
  name: factory-deployer
  apiGroup: rbac.authorization.k8s.io
